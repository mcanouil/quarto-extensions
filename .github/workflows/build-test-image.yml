name: Build Test Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 15 * *"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel: [release, prerelease]
    steps:
      - name: Checkout Dockerfile
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/docker/test-extensions
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Log in to ghcr.io
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image
        run: docker pull "ghcr.io/mcanouil/quarto-codespaces:${{ matrix.channel }}"

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .github/docker/test-extensions
          push: true
          build-args: |
            BASE_IMAGE=ghcr.io/mcanouil/quarto-codespaces:${{ matrix.channel }}
          tags: ghcr.io/${{ github.repository }}:${{ matrix.channel }}
