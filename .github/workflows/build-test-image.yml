name: Build Test Image

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel: [release, prerelease]
    steps:
      - name: Checkout Dockerfile
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          sparse-checkout: .github/docker/test-extensions
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Log in to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image
        run: docker pull "ghcr.io/mcanouil/quarto-codespaces:${{ matrix.channel }}"

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .github/docker/test-extensions
          push: true
          build-args: |
            BASE_IMAGE=ghcr.io/mcanouil/quarto-codespaces:${{ matrix.channel }}
          tags: ghcr.io/${{ github.repository }}:${{ matrix.channel }}
