name: Build Test Image

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel: [release, prerelease]
    steps:
      - name: Checkout Dockerfile
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/docker/test-extensions
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Log in to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image
        run: docker pull "ghcr.io/mcanouil/quarto-codespaces:${{ matrix.channel }}"

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .github/docker/test-extensions
          push: true
          build-args: |
            BASE_IMAGE=ghcr.io/mcanouil/quarto-codespaces:${{ matrix.channel }}
          tags: ghcr.io/${{ github.repository }}:${{ matrix.channel }}
