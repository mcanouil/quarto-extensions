name: Build Test Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel: [release, prerelease]
    steps:
      - name: Checkout Dockerfile
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/docker/test-extensions
          sparse-checkout-cone-mode: false

      - name: Log in to ghcr.io
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image
        run: docker pull "ghcr.io/mcanouil/quarto-codespaces:${{ matrix.channel }}"

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c3bc6c9f # v6
        with:
          context: .github/docker/test-extensions
          push: true
          build-args: |
            BASE_IMAGE=ghcr.io/mcanouil/quarto-codespaces:${{ matrix.channel }}
          tags: ghcr.io/${{ github.repository }}:${{ matrix.channel }}
