name: Check Extensions

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NUMBER: ${{ github.event.pull_request.number }}
  CSV_FILE: "extensions/quarto-extensions.csv"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  check-submission:
    runs-on: ubuntu-latest
    outputs:
      submission: ${{ steps.check-submission.outputs.SUBMISSION }}
      diff: ${{ steps.check-submission.outputs.DIFF }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Check for submission
        id: check-submission
        env:
          base_sha: ${{ github.event.pull_request.base.sha }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          base_ref: ${{ github.event.pull_request.base.ref }}
        shell: bash
        run: |
          set -x
          extension_submitted=$(git diff --name-only ${base_sha} ${head_sha} | grep "${CSV_FILE}" || true)
          if [[ -z "${extension_submitted}" ]]; then
            echo "::notice::No changes to ${CSV_FILE} found"
            echo "SUBMISSION=false" >>${GITHUB_OUTPUT}
            echo "DIFF=" >>${GITHUB_OUTPUT}
          else
            echo "::notice::Changes to ${CSV_FILE} found!"
            git fetch origin ${base_ref} --depth=1
            DIFF=$(
              git diff origin/${base_ref} HEAD -- ${CSV_FILE} | grep '^+[^+]' | sed 's/^+//' | base64 --wrap=0
            )
            if [[ -z "${DIFF}" ]]; then
              echo "::notice::No additions to ${CSV_FILE} found"
              echo "SUBMISSION=false" >>${GITHUB_OUTPUT}
              echo "DIFF=" >>${GITHUB_OUTPUT}
            else
              echo "SUBMISSION=true" >>${GITHUB_OUTPUT}
              echo "DIFF=${DIFF}" >>${GITHUB_OUTPUT}
            fi
          fi
          exit 0

  check-duplicate:
    runs-on: ubuntu-latest
    needs: check-submission
    outputs:
      errors: ${{ steps.store-errors.outputs.errors }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Check for duplicates
        if: needs.check-submission.outputs.submission == 'true'
        id: check
        shell: bash
        run: bash .github/scripts/check-extensions/check-duplicate.sh
      - name: Store errors
        if: always() && needs.check-submission.outputs.submission == 'true'
        id: store-errors
        env:
          errors: ${{ steps.check.outputs.errors }}
        shell: bash
        run: |
          if [[ -z "${errors}" ]]; then
            errors="[]"
          fi
          echo "errors=${errors}" >> ${GITHUB_OUTPUT}
      - name: End of check
        if: needs.check-submission.outputs.submission == 'false'
        shell: bash
        run: |
          echo "No changes to ${CSV_FILE} found"
          exit 0

  check-topics:
    runs-on: ubuntu-latest
    needs: check-submission
    outputs:
      errors: ${{ steps.store-errors.outputs.errors }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Check for topics
        if: needs.check-submission.outputs.submission == 'true'
        id: check
        env:
          DIFF: ${{ needs.check-submission.outputs.diff }}
        shell: bash
        run: bash .github/scripts/check-extensions/check-topics.sh
      - name: Store errors
        if: always() && needs.check-submission.outputs.submission == 'true'
        id: store-errors
        env:
          errors: ${{ steps.check.outputs.errors }}
        shell: bash
        run: |
          if [[ -z "${errors}" ]]; then
            errors="[]"
          fi
          echo "errors=${errors}" >> ${GITHUB_OUTPUT}
      - name: End of check
        if: needs.check-submission.outputs.submission == 'false'
        shell: bash
        run: |
          echo "No changes to ${CSV_FILE} found"
          exit 0

  check-description:
    runs-on: ubuntu-latest
    needs: check-submission
    outputs:
      errors: ${{ steps.store-errors.outputs.errors }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Check for description
        if: needs.check-submission.outputs.submission == 'true'
        id: check
        env:
          DIFF: ${{ needs.check-submission.outputs.diff }}
        shell: bash
        run: bash .github/scripts/check-extensions/check-description.sh
      - name: Store errors
        if: always() && needs.check-submission.outputs.submission == 'true'
        id: store-errors
        env:
          errors: ${{ steps.check.outputs.errors }}
        shell: bash
        run: |
          if [[ -z "${errors}" ]]; then
            errors="[]"
          fi
          echo "errors=${errors}" >> ${GITHUB_OUTPUT}
      - name: End of check
        if: needs.check-submission.outputs.submission == 'false'
        shell: bash
        run: |
          echo "No changes to ${CSV_FILE} found"
          exit 0

  check-release:
    runs-on: ubuntu-latest
    needs: check-submission
    outputs:
      errors: ${{ steps.store-errors.outputs.errors }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Check for release/tag
        if: needs.check-submission.outputs.submission == 'true'
        id: check
        env:
          DIFF: ${{ needs.check-submission.outputs.diff }}
        shell: bash
        run: bash .github/scripts/check-extensions/check-release.sh
      - name: Store errors
        if: always() && needs.check-submission.outputs.submission == 'true'
        id: store-errors
        env:
          errors: ${{ steps.check.outputs.errors }}
        shell: bash
        run: |
          if [[ -z "${errors}" ]]; then
            errors="[]"
          fi
          echo "errors=${errors}" >> ${GITHUB_OUTPUT}
      - name: End of check
        if: needs.check-submission.outputs.submission == 'false'
        shell: bash
        run: |
          echo "No changes to ${CSV_FILE} found"
          exit 0

  check-redirection:
    runs-on: ubuntu-latest
    needs: check-submission
    outputs:
      errors: ${{ steps.store-errors.outputs.errors }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Check for redirection
        if: needs.check-submission.outputs.submission == 'true'
        id: check
        env:
          DIFF: ${{ needs.check-submission.outputs.diff }}
        shell: bash
        run: bash .github/scripts/check-extensions/check-redirection.sh
      - name: Store errors
        if: always() && needs.check-submission.outputs.submission == 'true'
        id: store-errors
        env:
          errors: ${{ steps.check.outputs.errors }}
        shell: bash
        run: |
          if [[ -z "${errors}" ]]; then
            errors="[]"
          fi
          echo "errors=${errors}" >> ${GITHUB_OUTPUT}
      - name: End of check
        if: needs.check-submission.outputs.submission == 'false'
        shell: bash
        run: |
          echo "No changes to ${CSV_FILE} found"
          exit 0

  check-structure:
    runs-on: ubuntu-latest
    needs: check-submission
    outputs:
      errors: ${{ steps.store-errors.outputs.errors }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Check for extension structure
        if: needs.check-submission.outputs.submission == 'true'
        id: check
        env:
          DIFF: ${{ needs.check-submission.outputs.diff }}
        shell: bash
        run: bash .github/scripts/check-extensions/check-structure.sh
      - name: Store errors
        if: always() && needs.check-submission.outputs.submission == 'true'
        id: store-errors
        env:
          errors: ${{ steps.check.outputs.errors }}
        shell: bash
        run: |
          if [[ -z "${errors}" ]]; then
            errors="[]"
          fi
          echo "errors=${errors}" >> ${GITHUB_OUTPUT}
      - name: End of check
        if: needs.check-submission.outputs.submission == 'false'
        shell: bash
        run: |
          echo "No changes to ${CSV_FILE} found"
          exit 0

  check-wizard:
    runs-on: ubuntu-latest
    needs: check-submission
    outputs:
      notes: ${{ steps.store-notes.outputs.notes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Check for Quarto Wizard support
        if: needs.check-submission.outputs.submission == 'true'
        id: check
        env:
          DIFF: ${{ needs.check-submission.outputs.diff }}
        shell: bash
        run: bash .github/scripts/check-extensions/check-wizard.sh
      - name: Store notes
        if: always() && needs.check-submission.outputs.submission == 'true'
        id: store-notes
        env:
          notes: ${{ steps.check.outputs.notes }}
        shell: bash
        run: |
          if [[ -z "${notes}" ]]; then
            notes="[]"
          fi
          echo "notes=${notes}" >> ${GITHUB_OUTPUT}
      - name: End of check
        if: needs.check-submission.outputs.submission == 'false'
        shell: bash
        run: |
          echo "No changes to ${CSV_FILE} found"
          exit 0

  check-render:
    runs-on: ubuntu-latest
    needs: check-submission
    if: needs.check-submission.outputs.submission == 'true'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    outputs:
      errors: ${{ steps.check.outputs.errors || '[]' }}
      notes: ${{ steps.check.outputs.notes || '[]' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Log in to ghcr.io
        shell: bash
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
      - name: Pre-flight render
        id: check
        env:
          DIFF: ${{ needs.check-submission.outputs.diff }}
          BLOCKING: ${{ vars.CHECK_RENDER_BLOCKING || 'false' }}
          IMAGE: ghcr.io/${{ github.repository }}:release
          QUARTO_CHANNEL: release
        shell: bash
        run: bash .github/scripts/check-extensions/preflight-render.sh
      - name: Upload render logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: preflight-render-logs
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

  summary:
    runs-on: ubuntu-latest
    needs:
      - check-submission
      - check-duplicate
      - check-topics
      - check-description
      - check-release
      - check-redirection
      - check-structure
      - check-wizard
      - check-render
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Generate summary report
        if: needs.check-submission.outputs.submission == 'true'
        env:
          NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          DUPLICATE_RESULT: ${{ needs.check-duplicate.result }}
          TOPICS_RESULT: ${{ needs.check-topics.result }}
          DESCRIPTION_RESULT: ${{ needs.check-description.result }}
          RELEASE_RESULT: ${{ needs.check-release.result }}
          REDIRECTION_RESULT: ${{ needs.check-redirection.result }}
          STRUCTURE_RESULT: ${{ needs.check-structure.result }}
          DUPLICATE_ERRORS: ${{ needs.check-duplicate.outputs.errors }}
          TOPICS_ERRORS: ${{ needs.check-topics.outputs.errors }}
          DESCRIPTION_ERRORS: ${{ needs.check-description.outputs.errors }}
          RELEASE_ERRORS: ${{ needs.check-release.outputs.errors }}
          REDIRECTION_ERRORS: ${{ needs.check-redirection.outputs.errors }}
          STRUCTURE_ERRORS: ${{ needs.check-structure.outputs.errors }}
          WIZARD_NOTES: ${{ needs.check-wizard.outputs.notes }}
          RENDER_RESULT: ${{ needs.check-render.result }}
          RENDER_ERRORS: ${{ needs.check-render.outputs.errors }}
          RENDER_NOTES: ${{ needs.check-render.outputs.notes }}
        shell: bash
        run: |
          echo "## Extension Check Summary" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"

          CSV_FILE_ENCODED=$(echo -n "${CSV_FILE}" | hexdump -v -e '/1 "%02x"' | sed 's/\(..\)/%\1/g')

          declare -A mention_owners

          # The pre-flight render script emits blocking failures as errors and
          # advisory ones as notes, and only exits non-zero when blocking.
          errors_found=false
          if [[ "${DUPLICATE_RESULT}" == "failure" || \
                "${TOPICS_RESULT}" == "failure" || \
                "${DESCRIPTION_RESULT}" == "failure" || \
                "${RELEASE_RESULT}" == "failure" || \
                "${REDIRECTION_RESULT}" == "failure" || \
                "${STRUCTURE_RESULT}" == "failure" || \
                "${RENDER_RESULT}" == "failure" ]]; then
            errors_found=true
          fi

          if [[ "${errors_found}" == "true" ]]; then
            declare -A file_line_errors

            for errors_json in \
            "${DUPLICATE_ERRORS}" \
            "${TOPICS_ERRORS}" \
            "${DESCRIPTION_ERRORS}" \
            "${RELEASE_ERRORS}" \
            "${REDIRECTION_ERRORS}" \
            "${STRUCTURE_ERRORS}" \
            "${RENDER_ERRORS}"; do
              if [[ "${errors_json}" != "[]" && "${errors_json}" != "" ]]; then
                while read -r error_obj; do
                  line=$(echo "${error_obj}" | jq -r ".line")
                  message=$(echo "${error_obj}" | jq -r ".message")
                  echo "[DEBUG] line: '${line}', message: '${message}'" >&2
                  if [[ -z "${file_line_errors[${line}]}" ]]; then
                    file_line_errors["${line}"]="- ❌ ${message}"
                  else
                    file_line_errors["${line}"]+=$'\n- ❌ '"${message}"
                  fi
                done < <(echo "${errors_json}" | jq -c ".[]")
              fi
            done
            echo "The following issues were found in [\`${CSV_FILE}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${PR_BRANCH}/${CSV_FILE}):" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "🔍 [View workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"

            for line_number in $(echo "${!file_line_errors[@]}" | tr ' ' '\n' | sort -n); do
              entry=$(sed -n "${line_number}p" ${CSV_FILE})
              mention_owners["${entry%%/*}"]=1
              echo "### Line [${line_number}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/pull/${NUMBER}/files#diff-${CSV_FILE_ENCODED}L${line_number}): [\`${entry}\`](${GITHUB_SERVER_URL}/${entry})" >> "${GITHUB_STEP_SUMMARY}"
              echo "" >> "${GITHUB_STEP_SUMMARY}"
              echo -e "${file_line_errors[${line_number}]}" >> "${GITHUB_STEP_SUMMARY}"
              echo "" >> "${GITHUB_STEP_SUMMARY}"
            done
          else
            echo "✅ All checks passed successfully!" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "🔍 [View workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})" >> "${GITHUB_STEP_SUMMARY}"
          fi

          ALL_NOTES=$(jq -cn \
            --argjson w "${WIZARD_NOTES:-[]}" \
            --argjson r "${RENDER_NOTES:-[]}" \
            '$w + $r')

          if [[ "${ALL_NOTES}" != "[]" && "${ALL_NOTES}" != "" ]]; then
            declare -A file_line_notes

            while read -r note_obj; do
              line=$(echo "${note_obj}" | jq -r ".line")
              message=$(echo "${note_obj}" | jq -r ".message")
              if [[ -z "${file_line_notes[${line}]}" ]]; then
                file_line_notes["${line}"]="- 💡 ${message}"
              else
                file_line_notes["${line}"]+=$'\n- 💡 '"${message}"
              fi
            done < <(echo "${ALL_NOTES}" | jq -c ".[]")

            echo "---" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "### Suggestions" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"

            for line_number in $(echo "${!file_line_notes[@]}" | tr ' ' '\n' | sort -n); do
              entry=$(sed -n "${line_number}p" ${CSV_FILE})
              mention_owners["${entry%%/*}"]=1
              echo "#### Line [${line_number}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/pull/${NUMBER}/files#diff-${CSV_FILE_ENCODED}L${line_number}): [\`${entry}\`](${GITHUB_SERVER_URL}/${entry})" >> "${GITHUB_STEP_SUMMARY}"
              echo "" >> "${GITHUB_STEP_SUMMARY}"
              echo -e "${file_line_notes[${line_number}]}" >> "${GITHUB_STEP_SUMMARY}"
              echo "" >> "${GITHUB_STEP_SUMMARY}"
            done
          fi

          if [[ ${#mention_owners[@]} -gt 0 ]]; then
            mentions=""
            for owner in $(echo "${!mention_owners[@]}" | tr ' ' '\n' | sort); do
              mentions+="@${owner} "
            done
            echo "---" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "cc ${mentions% }" >> "${GITHUB_STEP_SUMMARY}"
          fi

          mkdir -p ./extensions-check-summary
          echo ${NUMBER} > ./extensions-check-summary/pr_number
          cp ${GITHUB_STEP_SUMMARY} ./extensions-check-summary/summary.md

      - uses: actions/upload-artifact@v7
        if: needs.check-submission.outputs.submission == 'true'
        with:
          name: extensions-check-summary
          path: extensions-check-summary/
