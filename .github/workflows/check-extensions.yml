name: Check Extensions

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NUMBER: ${{ github.event.pull_request.number }}
  CSV_FILE: "extensions/quarto-extensions.csv"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  check-submission:
    runs-on: ubuntu-latest
    outputs:
      submission: ${{ steps.check-submission.outputs.SUBMISSION }}
      diff: ${{ steps.check-submission.outputs.DIFF }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Check for submission
        id: check-submission
        env:
          base_sha: ${{ github.event.pull_request.base.sha }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          base_ref: ${{ github.event.pull_request.base.ref }}
        shell: bash
        run: |
          set -x
          extension_submitted=$(git diff --name-only ${base_sha} ${head_sha} | grep "${CSV_FILE}" || true)
          if [[ -z "${extension_submitted}" ]]; then
            echo "::notice::No changes to ${CSV_FILE} found"
            echo "SUBMISSION=false" >>${GITHUB_OUTPUT}
            echo "DIFF=" >>${GITHUB_OUTPUT}
          else
            echo "::notice::Changes to ${CSV_FILE} found!"
            git fetch origin ${base_ref} --depth=1
            DIFF=$(
              git diff origin/${base_ref} HEAD -- ${CSV_FILE} | grep '^+[^+]' | sed 's/^+//' | base64 --wrap=0
            )
            if [[ -z "${DIFF}" ]]; then
              echo "::notice::No additions to ${CSV_FILE} found"
              echo "SUBMISSION=false" >>${GITHUB_OUTPUT}
              echo "DIFF=" >>${GITHUB_OUTPUT}
            else
              echo "SUBMISSION=true" >>${GITHUB_OUTPUT}
              echo "DIFF=${DIFF}" >>${GITHUB_OUTPUT}
            fi
          fi
          exit 0

  check-metadata:
    runs-on: ubuntu-latest
    needs: check-submission
    if: needs.check-submission.outputs.submission == 'true'
    env:
      DIFF: ${{ needs.check-submission.outputs.diff }}
    outputs:
      failed: ${{ steps.duplicate.outcome == 'failure' || steps.topics.outcome == 'failure' || steps.description.outcome == 'failure' || steps.release.outcome == 'failure' || steps.redirection.outcome == 'failure' || steps.structure.outcome == 'failure' }}
      duplicate-errors: ${{ steps.duplicate.outputs.errors || '[]' }}
      topics-errors: ${{ steps.topics.outputs.errors || '[]' }}
      description-errors: ${{ steps.description.outputs.errors || '[]' }}
      release-errors: ${{ steps.release.outputs.errors || '[]' }}
      redirection-errors: ${{ steps.redirection.outputs.errors || '[]' }}
      structure-errors: ${{ steps.structure.outputs.errors || '[]' }}
      wizard-notes: ${{ steps.wizard.outputs.notes || '[]' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Check for duplicates
        id: duplicate
        continue-on-error: true
        shell: bash
        run: bash .github/scripts/check-extensions/check-duplicate.sh
      - name: Check for topics
        id: topics
        continue-on-error: true
        shell: bash
        run: bash .github/scripts/check-extensions/check-topics.sh
      - name: Check for description
        id: description
        continue-on-error: true
        shell: bash
        run: bash .github/scripts/check-extensions/check-description.sh
      - name: Check for release/tag
        id: release
        continue-on-error: true
        shell: bash
        run: bash .github/scripts/check-extensions/check-release.sh
      - name: Check for redirection
        id: redirection
        continue-on-error: true
        shell: bash
        run: bash .github/scripts/check-extensions/check-redirection.sh
      - name: Check for extension structure
        id: structure
        continue-on-error: true
        shell: bash
        run: bash .github/scripts/check-extensions/check-structure.sh
      - name: Check for Quarto Wizard support
        id: wizard
        continue-on-error: true
        shell: bash
        run: bash .github/scripts/check-extensions/check-wizard.sh

  check-render:
    runs-on: ubuntu-latest
    needs: check-submission
    if: needs.check-submission.outputs.submission == 'true'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    outputs:
      errors: ${{ steps.check.outputs.errors || '[]' }}
      notes: ${{ steps.check.outputs.notes || '[]' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Log in to ghcr.io
        shell: bash
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
      - name: Pre-flight render
        id: check
        env:
          DIFF: ${{ needs.check-submission.outputs.diff }}
          BLOCKING: ${{ vars.CHECK_RENDER_BLOCKING || 'false' }}
          IMAGE: ghcr.io/${{ github.repository }}:release
          QUARTO_CHANNEL: release
        shell: bash
        run: bash .github/scripts/check-extensions/preflight-render.sh
      - name: Upload render logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: preflight-render-logs
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

  summary:
    runs-on: ubuntu-latest
    needs:
      - check-submission
      - check-metadata
      - check-render
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Generate summary report
        if: needs.check-submission.outputs.submission == 'true'
        env:
          NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          METADATA_RESULT: ${{ needs.check-metadata.result }}
          METADATA_FAILED: ${{ needs.check-metadata.outputs.failed }}
          DUPLICATE_ERRORS: ${{ needs.check-metadata.outputs.duplicate-errors }}
          TOPICS_ERRORS: ${{ needs.check-metadata.outputs.topics-errors }}
          DESCRIPTION_ERRORS: ${{ needs.check-metadata.outputs.description-errors }}
          RELEASE_ERRORS: ${{ needs.check-metadata.outputs.release-errors }}
          REDIRECTION_ERRORS: ${{ needs.check-metadata.outputs.redirection-errors }}
          STRUCTURE_ERRORS: ${{ needs.check-metadata.outputs.structure-errors }}
          WIZARD_NOTES: ${{ needs.check-metadata.outputs.wizard-notes }}
          RENDER_RESULT: ${{ needs.check-render.result }}
          RENDER_ERRORS: ${{ needs.check-render.outputs.errors }}
          RENDER_NOTES: ${{ needs.check-render.outputs.notes }}
        shell: bash
        run: |
          echo "## Extension Check Summary" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"

          CSV_FILE_ENCODED=$(echo -n "${CSV_FILE}" | hexdump -v -e '/1 "%02x"' | sed 's/\(..\)/%\1/g')

          declare -A mention_owners

          # Metadata checks run with continue-on-error: check errors surface
          # via the per-step errors arrays, METADATA_FAILED covers scripts
          # that crashed before writing outputs, and METADATA_RESULT is only
          # 'failure' on infrastructure errors. The pre-flight render script
          # emits blocking failures as errors and advisory ones as notes, and
          # only exits non-zero when blocking.
          errors_found=false
          for errors_json in \
          "${DUPLICATE_ERRORS}" \
          "${TOPICS_ERRORS}" \
          "${DESCRIPTION_ERRORS}" \
          "${RELEASE_ERRORS}" \
          "${REDIRECTION_ERRORS}" \
          "${STRUCTURE_ERRORS}" \
          "${RENDER_ERRORS}"; do
            if [[ "${errors_json}" != "[]" && "${errors_json}" != "" ]]; then
              errors_found=true
            fi
          done
          if [[ "${METADATA_RESULT}" == "failure" || "${METADATA_FAILED}" == "true" || "${RENDER_RESULT}" == "failure" ]]; then
            errors_found=true
          fi

          if [[ "${errors_found}" == "true" ]]; then
            declare -A file_line_errors

            for errors_json in \
            "${DUPLICATE_ERRORS}" \
            "${TOPICS_ERRORS}" \
            "${DESCRIPTION_ERRORS}" \
            "${RELEASE_ERRORS}" \
            "${REDIRECTION_ERRORS}" \
            "${STRUCTURE_ERRORS}" \
            "${RENDER_ERRORS}"; do
              if [[ "${errors_json}" != "[]" && "${errors_json}" != "" ]]; then
                while read -r error_obj; do
                  line=$(echo "${error_obj}" | jq -r ".line")
                  message=$(echo "${error_obj}" | jq -r ".message")
                  echo "[DEBUG] line: '${line}', message: '${message}'" >&2
                  if [[ -z "${file_line_errors[${line}]}" ]]; then
                    file_line_errors["${line}"]="- ❌ ${message}"
                  else
                    file_line_errors["${line}"]+=$'\n- ❌ '"${message}"
                  fi
                done < <(echo "${errors_json}" | jq -c ".[]")
              fi
            done
            echo "The following issues were found in [\`${CSV_FILE}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${PR_BRANCH}/${CSV_FILE}):" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "🔍 [View workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"

            for line_number in $(echo "${!file_line_errors[@]}" | tr ' ' '\n' | sort -n); do
              entry=$(sed -n "${line_number}p" ${CSV_FILE})
              mention_owners["${entry%%/*}"]=1
              echo "### Line [${line_number}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/pull/${NUMBER}/files#diff-${CSV_FILE_ENCODED}L${line_number}): [\`${entry}\`](${GITHUB_SERVER_URL}/${entry})" >> "${GITHUB_STEP_SUMMARY}"
              echo "" >> "${GITHUB_STEP_SUMMARY}"
              echo -e "${file_line_errors[${line_number}]}" >> "${GITHUB_STEP_SUMMARY}"
              echo "" >> "${GITHUB_STEP_SUMMARY}"
            done
          else
            echo "✅ All checks passed successfully!" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "🔍 [View workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})" >> "${GITHUB_STEP_SUMMARY}"
          fi

          ALL_NOTES=$(jq -cn \
            --argjson w "${WIZARD_NOTES:-[]}" \
            --argjson r "${RENDER_NOTES:-[]}" \
            '$w + $r')

          if [[ "${ALL_NOTES}" != "[]" && "${ALL_NOTES}" != "" ]]; then
            declare -A file_line_notes

            while read -r note_obj; do
              line=$(echo "${note_obj}" | jq -r ".line")
              message=$(echo "${note_obj}" | jq -r ".message")
              if [[ -z "${file_line_notes[${line}]}" ]]; then
                file_line_notes["${line}"]="- 💡 ${message}"
              else
                file_line_notes["${line}"]+=$'\n- 💡 '"${message}"
              fi
            done < <(echo "${ALL_NOTES}" | jq -c ".[]")

            echo "---" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "### Suggestions" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"

            for line_number in $(echo "${!file_line_notes[@]}" | tr ' ' '\n' | sort -n); do
              entry=$(sed -n "${line_number}p" ${CSV_FILE})
              mention_owners["${entry%%/*}"]=1
              echo "#### Line [${line_number}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/pull/${NUMBER}/files#diff-${CSV_FILE_ENCODED}L${line_number}): [\`${entry}\`](${GITHUB_SERVER_URL}/${entry})" >> "${GITHUB_STEP_SUMMARY}"
              echo "" >> "${GITHUB_STEP_SUMMARY}"
              echo -e "${file_line_notes[${line_number}]}" >> "${GITHUB_STEP_SUMMARY}"
              echo "" >> "${GITHUB_STEP_SUMMARY}"
            done
          fi

          if [[ ${#mention_owners[@]} -gt 0 ]]; then
            mentions=""
            for owner in $(echo "${!mention_owners[@]}" | tr ' ' '\n' | sort); do
              mentions+="@${owner} "
            done
            echo "---" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "cc ${mentions% }" >> "${GITHUB_STEP_SUMMARY}"
          fi

          mkdir -p ./extensions-check-summary
          echo ${NUMBER} > ./extensions-check-summary/pr_number
          cp ${GITHUB_STEP_SUMMARY} ./extensions-check-summary/summary.md

      - uses: actions/upload-artifact@v7
        if: needs.check-submission.outputs.submission == 'true'
        with:
          name: extensions-check-summary
          path: extensions-check-summary/
