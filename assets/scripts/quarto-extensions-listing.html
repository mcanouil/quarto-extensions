<!-- Custom JavaScript for enhanced functionality -->
<script id="quarto-extensions-listing" type="text/javascript">
  document.addEventListener('DOMContentLoaded', function () {
    // --- Constants ---
    const GRID_BATCH_SIZE = 30;
    const LIST_BATCH_SIZE = 20;
    const SEARCH_DEBOUNCE_MS = 300;
    const EXCLUDE_CATEGORIES = [
      'example', 'template',
      'format', 'formats',
      'filter', 'filters',
      'shortcode', 'shortcodes'
    ];
    const FILTER_CHIP_VALUES = [
      'shortcode', 'filter', 'format',
      'project', 'revealjs-plugin', 'metadata'
    ];

    // --- Extensions data (loaded asynchronously) ---
    let allExtensionsData = [];
    let testResultsData = {};

    // --- Test results constants ---
    const REPO_URL = 'https://github.com/mcanouil/quarto-extensions';
    const CHANNEL_LABELS = { release: 'Release', prerelease: 'Pre-release' };
    const CHANNEL_ORDER = ['release', 'prerelease'];

    // --- Cache DOM elements ---
    const gridContainer = document.getElementById('grid-view-container');
    const listContainer = document.getElementById('list-view-container');
    const gridEl = document.getElementById('extensions-grid');
    const listEl = document.getElementById('extensions-list');
    const listViewBtn = document.getElementById('list-view');
    const gridViewBtn = document.getElementById('grid-view');
    const searchInput = document.getElementById('extension-search');
    const clearFiltersBtn = document.getElementById('clear-filters');
    const gridCounterElement = document.getElementById('grid-extensions-count');
    const listCounterElement = document.getElementById('list-extensions-count');

    if (!gridEl || !listEl || !gridViewBtn || !searchInput || !clearFiltersBtn) return;

    // --- State ---
    let activeFilters = new Set();
    let activeAuthorLogin = null;
    let sortState = { field: 'modified', direction: 'desc' };
    let currentVisibleItems = [];
    let gridRenderedCount = 0;
    let listRenderedCount = 0;

    // --- Helpers ---

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }


    function debounce(func, wait) {
      let timeout;
      return function (...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
          try {
            func.apply(this, args);
          } catch (error) {
            console.warn('Error in debounced function:', error);
          }
        }, wait);
      };
    }

    function getRelativeTime(fileModified) {
      const modifiedDate = new Date(fileModified);
      const now = new Date();
      const diffTime = Math.abs(now - modifiedDate);
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

      if (diffDays === 1) return '1 day ago';
      if (diffDays < 7) return `${diffDays} days ago`;
      if (diffDays < 30) {
        const weeks = Math.floor(diffDays / 7);
        return weeks === 1 ? '1 week ago' : `${weeks} weeks ago`;
      }
      if (diffDays < 365) {
        const months = Math.floor(diffDays / 30);
        return months === 1 ? '1 month ago' : `${months} months ago`;
      }
      const years = Math.floor(diffDays / 365);
      return years === 1 ? '1 year ago' : `${years} years ago`;
    }

    // Priority: superseded > deprecated > archived > experimental > stable
    function getStatusBanner(categories) {
      const lower = categories.map(c => c.toLowerCase());
      if (lower.includes('superseded')) {
        return { type: 'superseded', text: 'Superseded', class: 'warning', icon: 'bi-exclamation-triangle-fill' };
      }
      if (lower.includes('deprecated')) {
        return { type: 'deprecated', text: 'Deprecated', class: 'warning', icon: 'bi-exclamation-triangle-fill' };
      }
      if (lower.includes('archived')) {
        return { type: 'archived', text: 'Archived', class: 'secondary', icon: 'bi-archive-fill' };
      }
      if (lower.includes('experimental')) {
        return { type: 'experimental', text: 'Experimental', class: 'info', icon: 'bi-flask' };
      }
      if (lower.includes('stable')) {
        return { type: 'stable', text: 'Stable', class: 'success', icon: 'bi-check-circle-fill' };
      }
      return null;
    }

    // --- Test results helpers ---

    function getLatestTestResults(usageKey) {
      const key = usageKey.split('@')[0];
      const entry = testResultsData[key];
      if (!entry || !entry.results || entry.results.length === 0) return null;
      const byChannel = {};
      for (const r of entry.results) {
        const ch = r.quarto_channel;
        if (!byChannel[ch] || r.date > byChannel[ch].date) {
          byChannel[ch] = r;
        }
      }
      return { type: entry.type, latest: byChannel, allResults: entry.results };
    }

    function getTestStatusIcon(status) {
      switch (status) {
        case 'pass': return { icon: 'bi-check-circle-fill', colour: 'text-success', label: 'Pass' };
        case 'fail': return { icon: 'bi-x-circle-fill', colour: 'text-danger', label: 'Fail' };
        case 'skip': return { icon: 'bi-dash-circle-fill', colour: 'text-secondary', label: 'Skipped' };
        default:     return { icon: 'bi-question-circle', colour: 'text-muted', label: 'Unknown' };
      }
    }

    function renderTestBadges(usageKey, compact) {
      const data = getLatestTestResults(usageKey);
      if (!data) return '';
      let html = '';
      for (const ch of CHANNEL_ORDER) {
        const result = data.latest[ch];
        if (!result) continue;
        const s = getTestStatusIcon(result.status);
        const label = compact ? '' : ` ${CHANNEL_LABELS[ch] || ch}`;
        const version = result.quarto_version;
        html += `<button class="btn btn-link btn-sm p-0 test-badge-btn text-decoration-none"
          data-usage="${escapeHtml(usageKey)}"
          title="${s.label} on Quarto ${escapeHtml(version)} (${escapeHtml(CHANNEL_LABELS[ch] || ch)})">
          <i class="bi ${s.icon} ${s.colour}"></i>
          <span class="small text-muted">${escapeHtml(version)}${label}</span>
        </button>`;
      }
      return html ? `<span class="test-status-badges d-inline-flex gap-2 align-items-center">${html}</span>` : '';
    }

    function renderTestHistoryModal(usageKey) {
      const data = getLatestTestResults(usageKey);
      if (!data) return '';
      const key = usageKey.split('@')[0];
      const byChannel = {};
      for (const r of data.allResults) {
        if (!byChannel[r.quarto_channel]) byChannel[r.quarto_channel] = [];
        byChannel[r.quarto_channel].push(r);
      }
      for (const ch of Object.keys(byChannel)) {
        byChannel[ch].sort((a, b) => b.date.localeCompare(a.date));
      }
      let channelsHtml = '';
      for (const ch of CHANNEL_ORDER) {
        const results = byChannel[ch];
        if (!results) continue;
        let rowsHtml = '';
        for (const r of results) {
          const s = getTestStatusIcon(r.status);
          const logUrl = `${REPO_URL}/tree/quarto-tests/${r.log}`;
          rowsHtml += `<tr>
            <td><code>${escapeHtml(r.quarto_version)}</code></td>
            <td><i class="bi ${s.icon} ${s.colour}"></i> ${s.label}</td>
            <td>${escapeHtml(r.date)}</td>
            <td><a href="${escapeHtml(logUrl)}" target="_blank" rel="noopener noreferrer" class="btn btn-outline-light btn-sm">
              <i class="bi bi-file-text"></i> Logs
            </a></td>
          </tr>`;
        }
        channelsHtml += `
          <h6 class="mt-3 mb-2">${CHANNEL_LABELS[ch] || ch} Channel</h6>
          <div class="table-responsive">
            <table class="table table-sm table-hover mb-0">
              <thead><tr>
                <th>Version</th><th>Status</th><th>Date</th><th>Logs</th>
              </tr></thead>
              <tbody>${rowsHtml}</tbody>
            </table>
          </div>`;
      }
      return `<div class="modal fade" id="test-history-modal" tabindex="-1" aria-labelledby="test-history-modal-label" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title no-anchor" id="test-history-modal-label">
                Test Results: <code>${escapeHtml(key)}</code>
              </h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              ${channelsHtml}
            </div>
          </div>
        </div>
      </div>`;
    }

    function renderCategoryBadges(categories, idPrefix, maxVisible) {
      const filtered = categories.filter(c => !EXCLUDE_CATEGORIES.includes(c.toLowerCase()));
      const main = filtered.slice(0, maxVisible);
      const extra = filtered.slice(maxVisible);
      let html = '<span class="category-badges">';
      main.forEach(cat => {
        html += `<span class="badge bg-light text-dark me-1">${escapeHtml(cat)}</span>`;
      });
      if (extra.length > 0) {
        extra.forEach(cat => {
          html += `<span class="badge bg-light text-dark me-1 extra-category d-none" data-extra="${idPrefix}">${escapeHtml(cat)}</span>`;
        });
        html += `<button class="btn btn-link btn-sm p-0 text-muted category-expand-toggle" type="button" data-id="${idPrefix}">+${extra.length}${maxVisible > 2 ? ' more' : ''}</button>`;
      }
      html += '</span>';
      return html;
    }

    // --- Rendering functions ---
    // These match the HTML output of _grid.ejs and _list.ejs

    function renderGridCard(item) {
      const relativeTime = getRelativeTime(item.fileModified);
      const statusBanner = getStatusBanner(item.categories);
      const authorDisplay = (!item.author || item.author === 'null') ? item.login : item.author;
      const sid = item.id;
      const gridCatId = `grid-cat-${sid}`;

      let statusHtml = '';
      if (statusBanner) {
        statusHtml = `<div class="alert alert-${statusBanner.class} status-banner mb-0 rounded-0 text-center py-1" role="alert">`;
        if (statusBanner.icon) {
          statusHtml += `<i class="bi ${statusBanner.icon}"></i> `;
        }
        statusHtml += `<strong>${statusBanner.text}</strong></div>`;
      }

      let templateBadge = '';
      if (item.template) templateBadge = '<span class="badge bg-success ms-1">Template</span>';
      let exampleBadge = '';
      if (item.example) exampleBadge = '<span class="badge bg-info ms-1">Example</span>';

      let actionButtons = `<button class="btn btn-primary btn-sm flex-fill" data-bs-toggle="modal" data-bs-target="#install-modal-${sid}"><i class="bi bi-download"></i> Install</button>`;
      if (item.template) {
        actionButtons += `<button class="btn btn-outline-success btn-sm flex-fill" data-bs-toggle="modal" data-bs-target="#use-modal-${sid}"><i class="bi bi-file-plus"></i> Use</button>`;
      }
      if (item.example) {
        actionButtons += `<button class="btn btn-outline-info btn-sm flex-fill" data-bs-toggle="modal" data-bs-target="#use-modal-${sid}"><i class="bi bi-eye"></i> Use</button>`;
      }

      const testBadgesHtml = renderTestBadges(item.usage, true);

      return `<div class="g-col-12 g-col-sm-6 g-col-lg-4">
    <div class="card extension-card h-100"
         data-categories="${escapeHtml(item.categories.join(','))}"
         data-contributes="${escapeHtml(item.contributes.join(','))}"
         data-author="${escapeHtml(item.author)}"
         data-login="${escapeHtml(item.login)}"
         data-license="${escapeHtml(item.license)}"
         data-stars="${item.stars}"
         data-modified="${escapeHtml(item.fileModified)}"
         data-template="${item.template}"
         data-example="${item.example}">
      <div class="card-img-wrapper">
        <img src="${escapeHtml(item.image)}" loading="lazy" alt="${escapeHtml(item.imageAlt)}" class="card-img-top">
      </div>
      ${statusHtml}
      <div class="card-body d-flex flex-column">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <div class="test-status-badges-row">${testBadgesHtml}</div>
          <div>${templateBadge}${exampleBadge}</div>
        </div>
        <h6 class="card-title d-flex align-items-center justify-content-between no-anchor extension-title">
          <a href="${escapeHtml(item.githubUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a>
          <a href="${escapeHtml(item.githubUrl)}" target="_blank" rel="noopener noreferrer" class="btn btn-outline-light btn-sm ms-auto"><i class="bi bi-github"></i></a>
        </h6>
        <p class="card-text small text-muted mb-2">
          <button class="btn btn-link p-0 text-muted text-decoration-none filter-chip" data-filter="author" data-login="${escapeHtml(item.login)}">
            <i class="bi bi-person"></i> ${escapeHtml(authorDisplay)}
          </button>
        </p>
        <p class="card-text flex-grow-1 extension-description">${escapeHtml(item.description)}</p>
        <div class="card-categories mb-2 extension-categories">
          ${renderCategoryBadges(item.categories, gridCatId, 2)}
        </div>
        <div class="card-footer-info d-flex justify-content-between align-items-center small text-muted">
          <span><i class="bi bi-star-fill text-warning"></i> ${escapeHtml(String(item.stars))}</span>
          <span><i class="bi bi-clock"></i> ${relativeTime}</span>
        </div>
      </div>
      <div class="card-footer bg-transparent">
        <div class="d-flex gap-2 flex-wrap flex-sm-nowrap">${actionButtons}</div>
      </div>
    </div>
  </div>`;
    }

    function renderListItem(item) {
      const relativeTime = getRelativeTime(item.fileModified);
      const statusBanner = getStatusBanner(item.categories);
      const authorDisplay = (!item.author || item.author === 'null') ? item.login : item.author;
      const sid = item.id;
      const listCatId = `list-cat-${sid}`;

      let statusHtml = '';
      if (statusBanner) {
        statusHtml = `<div class="alert alert-${statusBanner.class} status-banner mb-0 mt-2 rounded text-center py-1 px-2 small" role="alert">`;
        if (statusBanner.icon) {
          statusHtml += `<i class="bi ${statusBanner.icon}"></i> `;
        }
        statusHtml += `<strong>${statusBanner.text}</strong></div>`;
      }

      let templateBadge = '';
      if (item.template) templateBadge = '<span class="badge bg-success ms-2">Template</span>';
      let exampleBadge = '';
      if (item.example) exampleBadge = '<span class="badge bg-info ms-2">Example</span>';

      let licenseHtml = '';
      if (item.license && item.license !== 'none') {
        licenseHtml = `<span class="text-muted small"><i class="bi bi-file-text"></i> ${escapeHtml(item.license)}</span>`;
      }

      let actionButtons = `<button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#install-modal-${sid}"><i class="bi bi-download"></i> Install</button>`;
      if (item.template) {
        actionButtons += `<button class="btn btn-outline-success btn-sm" data-bs-toggle="modal" data-bs-target="#use-modal-${sid}"><i class="bi bi-file-plus"></i> Use</button>`;
      }
      if (item.example) {
        actionButtons += `<button class="btn btn-outline-info btn-sm" data-bs-toggle="modal" data-bs-target="#use-modal-${sid}"><i class="bi bi-eye"></i> Use</button>`;
      }

      const testBadgesHtml = renderTestBadges(item.usage, false);

      return `<div class="list-group-item extension-item"
       data-categories="${escapeHtml(item.categories.join(','))}"
       data-contributes="${escapeHtml(item.contributes.join(','))}"
       data-author="${escapeHtml(item.author)}"
       data-login="${escapeHtml(item.login)}"
       data-license="${escapeHtml(item.license)}"
       data-stars="${item.stars}"
       data-modified="${escapeHtml(item.fileModified)}"
       data-template="${item.template}"
       data-example="${item.example}">
    <div class="d-flex flex-column flex-md-row align-items-start">
      <div class="extension-image me-0 mb-3 mb-md-0 me-md-3 flex-shrink-0" style="width:150px;">
        <img src="${escapeHtml(item.image)}" loading="lazy" alt="${escapeHtml(item.imageAlt)}" class="img-fluid rounded" style="max-width:150px;">
        ${statusHtml}
      </div>
      <div class="flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <div class="test-status-badges-row">${testBadgesHtml}</div>
          <div>${templateBadge}${exampleBadge}</div>
        </div>
        <div class="extension-header d-flex justify-content-between align-items-center mb-2">
          <div class="extension-title-section">
            <h5 class="extension-title mb-0 no-anchor">
              <a href="${escapeHtml(item.githubUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a>
            </h5>
          </div>
          <div class="extension-metrics-header">
            <div class="d-flex gap-3 align-items-center">
              <span class="text-muted small"><i class="bi bi-star-fill text-warning"></i> ${escapeHtml(String(item.stars))}</span>
              <span class="text-muted small"><i class="bi bi-clock"></i> ${relativeTime}</span>
              ${licenseHtml}
              <a href="${escapeHtml(item.githubUrl)}" target="_blank" rel="noopener noreferrer" class="btn btn-outline-light btn-sm"><i class="bi bi-github"></i></a>
            </div>
          </div>
        </div>
        <div class="extension-content">
          <div class="extension-author mb-1">
            <button class="btn btn-link p-0 text-muted text-decoration-none filter-chip" data-filter="author" data-login="${escapeHtml(item.login)}">
              <i class="bi bi-person"></i> ${escapeHtml(authorDisplay)}
            </button>
          </div>
          <div class="extension-description mb-2">${escapeHtml(item.description)}</div>
        </div>
        <div class="extension-footer d-flex justify-content-between align-items-center">
          <div class="extension-categories">
            ${renderCategoryBadges(item.categories, listCatId, 3)}
          </div>
          <div class="extension-actions">${actionButtons}</div>
        </div>
      </div>
    </div>
  </div>`;
    }

    // --- Modal rendering ---
    // Uses raw HTML with iconify-icon web component (already loaded by quarto-iconify extension)

    function renderCodeBlock(command) {
      return `<div class="code-with-filename code-window-macos">
<div class="code-with-filename-file"><pre><strong>Terminal</strong></pre></div>
<div class="code-copy-outer-scaffold"><div class="sourceCode" data-filename="Terminal" style="font-size: 0.8em; text-align: left;"><pre class="sourceCode sh code-with-copy"><code class="sourceCode bash"><span class="ex">quarto</span> ${command}</code></pre></div><button title="Copy to Clipboard" class="code-copy-button"><i class="bi"></i></button></div>
</div>`;
    }

    function renderInstallModal(item) {
      const sid = item.id;
      return `<div class="modal fade" id="install-modal-${sid}" tabindex="-1" aria-labelledby="install-modal-label" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title no-anchor" id="install-modal-label">Install Options</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <ul class="list-group list-group-flush">
          <li class="list-group-item list-group-item-action">
<div class="fw-bold" style="text-align: left;">
<p><iconify-icon icon="octicon:terminal" title="Terminal Icon" aria-label="Terminal Icon"></iconify-icon> Manually</p>
</div>
${renderCodeBlock(`add ${escapeHtml(item.usage)}`)}
          </li>
          <li class="list-group-item list-group-item-action">
<div class="fw-bold" style="text-align: left;">
<p><span class="quarto-wizard" title="Quarto Wizard Logo" aria-label="Quarto Wizard Logo"></span> Quarto Wizard</p>
</div>
            <div class="btn-group d-flex justify-content-center" role="group" aria-label="Quarto Wizard extension installer options">
              <button type="button" class="btn btn-outline-light" onclick="window.location.href='vscode://mcanouil.quarto-wizard/install?repo=${encodeURIComponent(item.usage)}'" data-bs-toggle="tooltip" title="Install ${escapeHtml(item.usage)} in Visual Studio Code using Quarto Wizard extension.">Visual Studio Code</button>
              <button type="button" class="btn btn-outline-light" onclick="window.location.href='positron://mcanouil.quarto-wizard/install?repo=${encodeURIComponent(item.usage)}'" data-bs-toggle="tooltip" title="Install ${escapeHtml(item.usage)} in Positron using Quarto Wizard extension.">Positron</button>
              <button type="button" class="btn btn-outline-light" onclick="window.location.href='vscodium://mcanouil.quarto-wizard/install?repo=${encodeURIComponent(item.usage)}'" data-bs-toggle="tooltip" title="Install ${escapeHtml(item.usage)} in VSCodium using Quarto Wizard extension.">VSCodium</button>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>`;
    }

    function renderUseModal(item) {
      const sid = item.id;
      return `<div class="modal fade" id="use-modal-${sid}" tabindex="-1" aria-labelledby="use-modal-label" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title no-anchor" id="use-modal-label">Use Options</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <ul class="list-group list-group-flush">
          <li class="list-group-item list-group-item-action">
<div class="fw-bold" style="text-align: left;">
<p><iconify-icon icon="octicon:terminal" title="Terminal Icon" aria-label="Terminal Icon"></iconify-icon> Manually</p>
</div>
${renderCodeBlock(`use template ${escapeHtml(item.usage)}`)}
          </li>
          <li class="list-group-item list-group-item-action">
<div class="fw-bold" style="text-align: left;">
<p><span class="quarto-wizard" title="Quarto Wizard Logo" aria-label="Quarto Wizard Logo"></span> Quarto Wizard</p>
</div>
            <div class="btn-group d-flex justify-content-center" role="group" aria-label="Quarto Wizard extension template installer options">
              <button type="button" class="btn btn-outline-light" onclick="window.location.href='vscode://mcanouil.quarto-wizard/use?repo=${encodeURIComponent(item.usage)}'" data-bs-toggle="tooltip" title="Use ${escapeHtml(item.usage)} template in Visual Studio Code using Quarto Wizard extension.">Visual Studio Code</button>
              <button type="button" class="btn btn-outline-light" onclick="window.location.href='positron://mcanouil.quarto-wizard/use?repo=${encodeURIComponent(item.usage)}'" data-bs-toggle="tooltip" title="Use ${escapeHtml(item.usage)} template in Positron using Quarto Wizard extension.">Positron</button>
              <button type="button" class="btn btn-outline-light" onclick="window.location.href='vscodium://mcanouil.quarto-wizard/use?repo=${encodeURIComponent(item.usage)}'" data-bs-toggle="tooltip" title="Use ${escapeHtml(item.usage)} template in VSCodium using Quarto Wizard extension.">VSCodium</button>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>`;
    }

    // --- Data operations ---

    function sortItems(items, field, direction) {
      return items.slice().sort((a, b) => {
        let valueA, valueB;
        if (field === 'modified') {
          valueA = new Date(a.fileModified || 0);
          valueB = new Date(b.fileModified || 0);
        } else if (field === 'stars') {
          valueA = parseInt(a.stars || 0);
          valueB = parseInt(b.stars || 0);
        } else {
          return 0;
        }
        return direction === 'desc' ? valueB - valueA : valueA - valueB;
      });
    }

    function matchesSearch(item, query) {
      if (!query) return true;
      const fields = [
        item.title,
        item.description,
        item.author,
        item.login,
        (item.categories || []).join(','),
        (item.contributes || []).join(',')
      ];
      return fields.some(f => (f || '').toLowerCase().includes(query));
    }

    function matchesFilters(item) {
      // Author filter
      if (activeAuthorLogin) {
        if (item.login !== activeAuthorLogin) return false;
      }
      // Category and test status filters
      if (activeFilters.size > 0) {
        const contributesLower = (item.contributes || []).map(v => v.toLowerCase().trim());
        for (const filter of activeFilters) {
          if (filter === 'test-pass') {
            const data = getLatestTestResults(item.usage);
            if (!data) return false;
            const hasPass = Object.values(data.latest).some(r => r.status === 'pass');
            if (!hasPass) return false;
          } else if (filter === 'test-fail') {
            const data = getLatestTestResults(item.usage);
            if (!data) return false;
            const hasFail = Object.values(data.latest).some(r => r.status === 'fail');
            if (!hasFail) return false;
          } else if (FILTER_CHIP_VALUES.includes(filter)) {
            const hasMatch = contributesLower.some(val => val.startsWith(filter));
            if (!hasMatch) return false;
          }
        }
      }
      return true;
    }

    // --- Rendering engine ---

    function clearContainer(container) {
      container.innerHTML = '';
    }

    function renderBatch(view) {
      if (view === 'grid') {
        const start = gridRenderedCount;
        const end = Math.min(start + GRID_BATCH_SIZE, currentVisibleItems.length);
        if (start >= end) return;

        const fragment = document.createDocumentFragment();
        for (let i = start; i < end; i++) {
          const temp = document.createElement('div');
          temp.innerHTML = renderGridCard(currentVisibleItems[i]);
          fragment.appendChild(temp.firstElementChild);
        }
        gridEl.appendChild(fragment);
        gridRenderedCount = end;
      } else {
        const start = listRenderedCount;
        const end = Math.min(start + LIST_BATCH_SIZE, currentVisibleItems.length);
        if (start >= end) return;

        const fragment = document.createDocumentFragment();
        for (let i = start; i < end; i++) {
          const temp = document.createElement('div');
          temp.innerHTML = renderListItem(currentVisibleItems[i]);
          fragment.appendChild(temp.firstElementChild);
        }
        listEl.appendChild(fragment);
        listRenderedCount = end;
      }

      updateExtensionsCounter();
    }

    function rebuildView() {
      // Compute filtered + searched + sorted items
      const query = searchInput.value.trim().toLowerCase();

      currentVisibleItems = allExtensionsData.filter(item =>
        matchesSearch(item, query) && matchesFilters(item)
      );
      currentVisibleItems = sortItems(currentVisibleItems, sortState.field, sortState.direction);

      // Clear and re-render grid
      clearContainer(gridEl);
      gridRenderedCount = 0;
      renderBatch('grid');

      // Clear and re-render list
      clearContainer(listEl);
      listRenderedCount = 0;
      renderBatch('list');

      // Update author styling
      updateAuthorStyling(activeAuthorLogin);
    }

    // --- Unified visibility (search + filters + sort) ---

    function applyVisibility() {
      if (allExtensionsData.length === 0) return; // Data not loaded yet
      rebuildView();
    }

    // --- Extensions counter ---

    function updateExtensionsCounter() {
      const total = currentVisibleItems.length;
      if (gridCounterElement) {
        gridCounterElement.textContent = total;
        gridCounterElement.setAttribute('aria-live', 'polite');
        gridCounterElement.setAttribute('aria-label', `${total} extensions shown`);
      }
      if (listCounterElement) {
        listCounterElement.textContent = total;
        listCounterElement.setAttribute('aria-live', 'polite');
        listCounterElement.setAttribute('aria-label', `${total} extensions shown`);
      }
    }

    // --- Infinite scroll ---

    let loading = false;
    const SCROLL_THRESHOLD = 400; // pixels from bottom to trigger load

    function onScroll() {
      if (loading) return;
      const scrollY = window.scrollY || document.documentElement.scrollTop;
      const viewportH = window.innerHeight;
      const docH = document.documentElement.scrollHeight;
      if (scrollY + viewportH + SCROLL_THRESHOLD < docH) return;

      const isGridVisible = !gridContainer.classList.contains('d-none');
      const isListVisible = !listContainer.classList.contains('d-none');
      const gridNeeds = isGridVisible && gridRenderedCount < currentVisibleItems.length;
      const listNeeds = isListVisible && listRenderedCount < currentVisibleItems.length;
      if (!gridNeeds && !listNeeds) return;

      loading = true;
      if (gridNeeds) renderBatch('grid');
      if (listNeeds) renderBatch('list');
      // Allow next load only after browser has painted the new items
      requestAnimationFrame(() => { loading = false; });
    }

    window.addEventListener('scroll', onScroll, { passive: true });

    // --- On-demand modal creation ---

    const itemsById = new Map();

    document.addEventListener('click', function (e) {
      const trigger = e.target.closest('[data-bs-toggle="modal"]');
      if (!trigger) return;
      const targetSelector = trigger.getAttribute('data-bs-target');
      if (!targetSelector) return;
      const modalId = targetSelector.replace('#', '');

      // If the modal already exists in the DOM, let Bootstrap handle it
      if (document.getElementById(modalId)) return;

      // Extract item ID and modal type from the modal ID
      let itemId, modalType;
      if (modalId.startsWith('install-modal-')) {
        itemId = modalId.replace('install-modal-', '');
        modalType = 'install';
      } else if (modalId.startsWith('use-modal-')) {
        itemId = modalId.replace('use-modal-', '');
        modalType = 'use';
      } else {
        return;
      }

      const item = itemsById.get(itemId);
      if (!item) return;

      // Prevent Bootstrap's default handler from running before modal exists
      e.stopPropagation();
      e.preventDefault();

      // Generate and insert the modal
      const html = modalType === 'install' ? renderInstallModal(item) : renderUseModal(item);
      const temp = document.createElement('div');
      temp.innerHTML = html;
      const modalEl = temp.firstElementChild;
      document.body.appendChild(modalEl);

      // Clean up modal DOM and clipboard instances on close
      modalEl.addEventListener('hidden.bs.modal', function () {
        const bsModal = bootstrap.Modal.getInstance(modalEl);
        if (bsModal) bsModal.dispose();
        modalEl.remove();
      });

      // Open explicitly
      new bootstrap.Modal(modalEl).show();
    }, true); // Capture phase

    // --- Test history modal ---

    document.addEventListener('click', function (e) {
      const badge = e.target.closest('.test-badge-btn');
      if (!badge) return;
      e.preventDefault();
      e.stopPropagation();

      const usageKey = badge.dataset.usage;
      const existing = document.getElementById('test-history-modal');
      if (existing) {
        const bsModal = bootstrap.Modal.getInstance(existing);
        if (bsModal) bsModal.dispose();
        existing.remove();
      }

      const html = renderTestHistoryModal(usageKey);
      if (!html) return;

      const temp = document.createElement('div');
      temp.innerHTML = html;
      const modalEl = temp.firstElementChild;
      document.body.appendChild(modalEl);

      modalEl.addEventListener('hidden.bs.modal', function () {
        const bsModal = bootstrap.Modal.getInstance(modalEl);
        if (bsModal) bsModal.dispose();
        modalEl.remove();
      });

      new bootstrap.Modal(modalEl).show();
    }, true);

    // --- View toggle ---

    if (listViewBtn) {
      listViewBtn.addEventListener('change', function () {
        if (this.checked) {
          listContainer.classList.remove('d-none');
          gridContainer.classList.add('d-none');
          listContainer.setAttribute('aria-hidden', 'false');
          gridContainer.setAttribute('aria-hidden', 'true');
          // Trigger list rendering if needed
          onScroll();
        }
      });
    }

    gridViewBtn.addEventListener('change', function () {
      if (this.checked) {
        gridContainer.classList.remove('d-none');
        listContainer.classList.add('d-none');
        gridContainer.setAttribute('aria-hidden', 'false');
        listContainer.setAttribute('aria-hidden', 'true');
        // Trigger grid rendering if needed
        onScroll();
      }
    });

    // --- Search ---

    searchInput.addEventListener('input', debounce(applyVisibility, SEARCH_DEBOUNCE_MS));

    // --- Filter chips ---

    function handleAuthorFilter(chip) {
      const clickedLogin = chip.dataset.login;

      if (activeAuthorLogin === clickedLogin) {
        chip.classList.remove('active');
        chip.setAttribute('aria-pressed', 'false');
        activeAuthorLogin = null;
      } else {
        document.querySelectorAll('.filter-chip[data-filter="author"][data-login]').forEach(btn => {
          btn.classList.remove('active');
          btn.setAttribute('aria-pressed', 'false');
        });
        chip.classList.add('active');
        chip.setAttribute('aria-pressed', 'true');
        activeAuthorLogin = clickedLogin;
      }
      applyVisibility();
    }

    function updateAuthorStyling(activeLogin) {
      document.querySelectorAll('.filter-chip[data-filter="author"][data-login]').forEach(btn => {
        btn.style.fontWeight = (activeLogin && btn.dataset.login === activeLogin) ? 'bold' : '';
      });
    }

    function handleRegularFilter(chip, filter) {
      if (chip.classList.contains('active')) {
        chip.classList.remove('active');
        chip.setAttribute('aria-pressed', 'false');
        activeFilters.delete(filter);
      } else {
        chip.classList.add('active');
        chip.setAttribute('aria-pressed', 'true');
        activeFilters.add(filter);
      }
      applyVisibility();
    }

    function handleSorting(field, chip) {
      if (sortState.field === field) {
        sortState.direction = sortState.direction === 'desc' ? 'asc' : 'desc';
      } else {
        sortState.field = field;
        sortState.direction = 'desc';
      }
      updateSortIcons(chip, sortState.direction);
      applyVisibility();
    }

    function updateSortIcons(activeChip, direction) {
      document.querySelectorAll('.filter-chip .sort-icon').forEach(icon => icon.remove());
      const icon = document.createElement('i');
      icon.className = `sort-icon ms-1 bi bi-arrow-${direction === 'desc' ? 'down' : 'up'}`;
      icon.setAttribute('aria-hidden', 'true');
      activeChip.appendChild(icon);
    }

    // Event delegation for filter chips
    document.addEventListener('click', function (e) {
      const chip = e.target.closest('.filter-chip');
      if (!chip) return;

      const filter = chip.dataset.filter;

      if (filter === 'author' && chip.dataset.login) {
        handleAuthorFilter(chip);
        return;
      }
      if (filter === 'recent') {
        handleSorting('modified', chip);
        return;
      }
      if (filter === 'popular') {
        handleSorting('stars', chip);
        return;
      }

      handleRegularFilter(chip, filter);
    });

    // --- Clear filters ---

    clearFiltersBtn.addEventListener('click', function () {
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.classList.remove('active');
        chip.setAttribute('aria-pressed', 'false');
        const icon = chip.querySelector('.sort-icon');
        if (icon) icon.remove();
      });

      activeFilters.clear();
      activeAuthorLogin = null;
      updateAuthorStyling(null);

      sortState = { field: 'modified', direction: 'desc' };

      // Restore visual indicator for 'Recently Updated' chip
      const recentChip = document.querySelector('.filter-chip[data-filter="recent"]');
      if (recentChip) {
        const icon = document.createElement('i');
        icon.className = 'sort-icon ms-1 bi bi-arrow-down';
        icon.setAttribute('aria-hidden', 'true');
        recentChip.appendChild(icon);
      }

      if (searchInput.value) {
        searchInput.value = '';
      }
      applyVisibility();
    });

    // --- Category expansion ---

    document.body.addEventListener('click', function (e) {
      const btn = e.target.closest('.category-expand-toggle');
      if (btn) {
        e.stopPropagation();
        const targetId = btn.getAttribute('data-id');
        const extraBadges = document.querySelectorAll('.extra-category[data-extra="' + targetId + '"]');
        if (extraBadges.length > 0) {
          extraBadges.forEach(badge => badge.classList.remove('d-none'));
          btn.classList.add('category-expanded');
          btn.style.display = 'none';
          return;
        }
        const target = document.getElementById(targetId);
        if (target) {
          target.classList.remove('d-none');
          btn.classList.add('category-expanded');
          btn.style.display = 'none';
        }
      }
    });

    document.addEventListener('click', function (e) {
      document.querySelectorAll('.category-expand-toggle.category-expanded').forEach(function (btn) {
        const targetId = btn.getAttribute('data-id');
        let container = btn.closest('.list-group-item, .extension-card');
        let clickedInside = btn.contains(e.target);

        if (container) {
          const extraBadges = container.querySelectorAll('.extra-category[data-extra="' + targetId + '"]');
          extraBadges.forEach(badge => {
            if (badge.contains(e.target)) clickedInside = true;
          });
          if (!clickedInside && extraBadges.length > 0) {
            extraBadges.forEach(badge => badge.classList.add('d-none'));
            btn.classList.remove('category-expanded');
            btn.style.display = '';
          }
          return;
        }

        const target = document.getElementById(targetId);
        if (target && !btn.contains(e.target) && !target.contains(e.target)) {
          target.classList.add('d-none');
          btn.classList.remove('category-expanded');
          btn.style.display = '';
        }
      });
    });

    // --- Initialise ---

    // Set default sort icon
    const recentChip = document.querySelector('.filter-chip[data-filter="recent"]');
    if (recentChip) {
      const icon = document.createElement('i');
      icon.className = 'sort-icon ms-1 bi bi-arrow-down';
      icon.setAttribute('aria-hidden', 'true');
      recentChip.appendChild(icon);
    }

    // Count server-rendered initial items and show counter immediately
    const initialGridItems = gridEl.querySelectorAll('.g-col-12.g-col-sm-6.g-col-lg-4');
    const initialListItems = listEl.querySelectorAll('.list-group-item.extension-item');
    gridRenderedCount = initialGridItems.length;
    listRenderedCount = initialListItems.length;
    if (gridCounterElement) gridCounterElement.textContent = gridRenderedCount;
    if (listCounterElement) listCounterElement.textContent = listRenderedCount;

    // Fetch extensions and test results data in parallel
    Promise.all([
      fetch('extensions-listing.json').then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      }),
      fetch('test-results.json').then(r => r.ok ? r.json() : {}).catch(() => ({}))
    ])
      .then(([extensions, testResults]) => {
        allExtensionsData = extensions;
        testResultsData = testResults;
        extensions.forEach(item => itemsById.set(item.id, item));
        rebuildView();
      })
      .catch(error => {
        console.warn('Failed to load extensions data:', error);
        // Graceful degradation: server-rendered items remain visible
        // but search/filter/progressive loading will not work
      });
  });
</script>
<!-- Custom JavaScript for clipboard.js to properly access code inside modals -->
<script id="quarto-extensions-listing-clipboardjs" type="text/javascript">
  window.document.addEventListener('DOMContentLoaded', (event) => {
    /**
     * Initialise clipboard functionality for any modal
     */
    const initialiseModalClipboard = () => {
      const modals = document.querySelectorAll('.modal');

      modals.forEach((modal) => {
        const modalId = modal.getAttribute('id');
        if (!modalId) return;

        const copyButtons = modal.querySelectorAll('.code-copy-button');
        if (copyButtons.length === 0) return;

        // Skip if already initialised
        if (modal.dataset.clipboardInitialised === 'true') return;
        modal.dataset.clipboardInitialised = 'true';

        copyButtons.forEach((button) => {
          button.setAttribute('data-in-quarto-modal', modalId);
        });

        const clipboardModal = new window.ClipboardJS(
          `.code-copy-button[data-in-quarto-modal="${modalId}"]`,
          {
            text: (trigger) => {
              const codeEl = trigger.previousElementSibling.cloneNode(true);
              const annotations = codeEl.querySelectorAll('[class*="code-annotation-"]');
              annotations.forEach((annotation) => annotation.remove());
              return codeEl.innerText;
            },
            container: modal
          }
        );

        clipboardModal.on('success', (e) => {
          const button = e.trigger;
          button.blur();
          button.classList.add('code-copy-button-checked');
          const currentTitle = button.getAttribute('title');
          button.setAttribute('title', 'Copied!');

          let tooltip;
          if (window.bootstrap) {
            button.setAttribute('data-bs-toggle', 'tooltip');
            button.setAttribute('data-bs-placement', 'left');
            button.setAttribute('data-bs-title', 'Copied!');
            tooltip = new bootstrap.Tooltip(button, {
              trigger: 'manual',
              customClass: 'code-copy-button-tooltip',
              offset: [0, -8]
            });
            tooltip.show();
          }

          setTimeout(() => {
            if (tooltip) {
              tooltip.hide();
              button.removeAttribute('data-bs-title');
              button.removeAttribute('data-bs-toggle');
              button.removeAttribute('data-bs-placement');
            }
            button.setAttribute('title', currentTitle);
            button.classList.remove('code-copy-button-checked');
          }, 1000);

          e.clearSelection();
        });

        clipboardModal.on('error', (e) => {
          console.error(`Clipboard error in modal ${modalId}:`, e);
          const button = e.trigger;
          button.setAttribute('title', 'Press Ctrl+C to copy');
          button.style.backgroundColor = '#f8d7da';
          setTimeout(() => {
            button.style.backgroundColor = '';
            button.setAttribute('title', 'Copy to Clipboard');
          }, 2000);
        });
      });
    };

    initialiseModalClipboard();

    // Re-initialise when modals are shown (handles dynamically created modals)
    document.addEventListener('shown.bs.modal', () => {
      initialiseModalClipboard();
    });
  });
</script>
